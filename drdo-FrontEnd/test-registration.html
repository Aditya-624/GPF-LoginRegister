<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Test Registration - Work Status</h1>
    
    <form id="registrationForm">
        <div class="form-group">
            <label for="userId">Username *</label>
            <input type="text" id="userId" name="userId" required>
        </div>

        <div class="form-group">
            <label for="workStatus">Work Status *</label>
            <select id="workStatus" name="workStatus" required>
                <option value="">-- Select Work Status --</option>
                <option value="OFFICER">Government Officer</option>
                <option value="INDUSTRIAL">Industrial</option>
                <option value="NON_INDUSTRIAL">Non Industrial</option>
            </select>
        </div>

        <div class="form-group">
            <label for="dob">Date of Birth *</label>
            <input type="date" id="dob" name="dob" required>
        </div>

        <div class="form-group">
            <label for="password">Password *</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="form-group">
            <label for="passwordExpiryDays">Password Expiry Days *</label>
            <input type="number" id="passwordExpiryDays" name="passwordExpiryDays" value="30" min="0" max="30" required>
        </div>

        <div class="form-group">
            <label for="securityAnswer1">Security Answer 1 *</label>
            <input type="text" id="securityAnswer1" name="securityAnswer1" required>
        </div>

        <div class="form-group">
            <label for="securityAnswer2">Security Answer 2 *</label>
            <input type="text" id="securityAnswer2" name="securityAnswer2" required>
        </div>

        <button type="submit">Register</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            
            // Validate required fields
            const userId = formData.get('userId')?.trim();
            const workStatus = formData.get('workStatus')?.trim();
            const password = formData.get('password')?.trim();
            
            if (!userId || !workStatus || !password) {
                const resultDiv = document.getElementById('result');
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Error: Please fill in all required fields (Username, Work Status, Password)';
                return;
            }
            
            if (password.length < 8) {
                const resultDiv = document.getElementById('result');
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Error: Password must be at least 8 characters long';
                return;
            }
            
            const data = {
                userId: userId,
                username: userId,
                workStatus: workStatus,
                password: password,
                dob: formData.get('dob'),
                passwordExpiryDays: parseInt(formData.get('passwordExpiryDays')),
                securityQuestion1: "What is your Nickname?",
                securityAnswer1: formData.get('securityAnswer1'),
                securityQuestion2: "What is your First School Name?",
                securityAnswer2: formData.get('securityAnswer2')
            };

            console.log('Sending data:', data);

            try {
                const response = await fetch('http://localhost:8081/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                const resultDiv = document.getElementById('result');

                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = 'Success: ' + result.message;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = 'Error: ' + (result.error || JSON.stringify(result, null, 2));
                    console.error('Server response:', result);
                }
            } catch (error) {
                const resultDiv = document.getElementById('result');
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Error: ' + error.message;
                console.error('Request error:', error);
            }
        });

        // Log when work status changes
        document.getElementById('workStatus').addEventListener('change', function(e) {
            console.log('Work Status selected:', e.target.value);
        });
    </script>
</body>
</html>
