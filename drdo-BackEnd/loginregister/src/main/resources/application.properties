spring.application.name=loginregister

# Oracle Database configuration - samplesql connection
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/xe
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=aditya
spring.datasource.password=aditya2468

# JPA/Hibernate properties for Oracle
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Enable Flyway for database migrations
spring.flyway.enabled=true

# JWT settings
jwt.secret=mySecretKey123456789012345678901234567890
jwt.expiration-ms=3600000

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# Dev toggle - temporarily disable auth for testing
app.security.disable-auth=true

# Server port
server.port=8081
